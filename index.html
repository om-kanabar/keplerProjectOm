<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
    <link rel="icon" href="https://cdn.omkanabar.com/assets/branding/logos/DarkMainLogo.png" type="image/png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Lexend:wght@100..900&family=Poiret+One&family=Righteous&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/menlo" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="/dashboard/dashboard.css?v=20260715.38">
    <script src="loading.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="loading" id="loading-screen" role="status" aria-label="Loading Habitat">
        <p class="loading-hero">HABITAT</p>
        <div class="loading-status" aria-hidden="true">
            <span class="loading-dots">
                <span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
            </span>
        </div>
        <p class="loading-error" id="loading-error" role="alert">AN ERROR OCCURRED: UNABLE TO REACH BUILD SERVER</p>
    </div>
    <main class="auth-page" aria-labelledby="auth-title" hidden>
        <section class="auth-panel">
            <p class="auth-kicker">HABITAT / TERMINAL AUTH</p>
            <h1 id="auth-title">Enter auth code<br>from terminal.</h1>
            <p class="auth-copy">Run this in your terminal, then paste the one-time code here.</p>
            <code class="auth-command">habitat auth web</code>
            <form id="web-auth-form" class="auth-form">
                <label for="web-login-code">Auth code</label>
                <div class="auth-passcode-entry">
                    <input id="web-login-code" name="code" type="password" autocomplete="one-time-code" autocapitalize="characters" spellcheck="false" maxlength="24" required>
                    <span class="auth-passcode-dots" aria-hidden="true"></span>
                </div>
                <button type="submit">Continue</button>
                <p id="web-auth-error" class="auth-error" role="alert"></p>
            </form>
        </section>
    </main>
    <main class="dashboard-shell" aria-labelledby="dashboard-title" hidden>
        <div id="dashboard-root" aria-labelledby="dashboard-title"></div>
    </main>
    <footer class="site-footer mt-2">
        <span>&nbsp;</span>
        <p class="build-commit">Build&nbsp;<a id="build-commit">UNKNOWN</a>&nbsp;from&nbsp;<span id="time-commit">UNKNOWN</span></p>
    </footer>
</body>
</html>
